<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Independence Day picnic with fireworks, stars and a checkered tablecloth">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1740"/>
      <stop offset="0.55" stop-color="#16306b"/>
      <stop offset="1" stop-color="#3a5ca8"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fdf6e3"/>
      <stop offset="1" stop-color="#f3e0b0"/>
    </radialGradient>
    <linearGradient id="cloth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c8102e"/>
      <stop offset="1" stop-color="#9c0c24"/>
    </linearGradient>
    <pattern id="gingham" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="#c8102e"/>
      <rect width="60" height="120" fill="#d8324c"/>
      <rect width="120" height="60" fill="#d8324c" opacity="0.55"/>
      <rect width="60" height="60" fill="#ffffff" opacity="0.92"/>
    </pattern>
    <g id="burst">
      <g stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="-90"/>
        <line x1="0" y1="0" x2="64" y2="-64"/>
        <line x1="0" y1="0" x2="90" y2="0"/>
        <line x1="0" y1="0" x2="64" y2="64"/>
        <line x1="0" y1="0" x2="0" y2="90"/>
        <line x1="0" y1="0" x2="-64" y2="64"/>
        <line x1="0" y1="0" x2="-90" y2="0"/>
        <line x1="0" y1="0" x2="-64" y2="-64"/>
        <line x1="0" y1="0" x2="34" y2="-83"/>
        <line x1="0" y1="0" x2="83" y2="-34"/>
        <line x1="0" y1="0" x2="83" y2="34"/>
        <line x1="0" y1="0" x2="34" y2="83"/>
        <line x1="0" y1="0" x2="-34" y2="83"/>
        <line x1="0" y1="0" x2="-83" y2="34"/>
        <line x1="0" y1="0" x2="-83" y2="-34"/>
        <line x1="0" y1="0" x2="-34" y2="-83"/>
      </g>
    </g>
    <g id="star" fill="#ffffff">
      <path d="M0,-13 L3.8,-4 L13,-4 L5.6,2 L8.4,11 L0,5.5 L-8.4,11 L-5.6,2 L-13,-4 L-3.8,-4 Z"/>
    </g>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="120" cy="90" r="2.4"/>
    <circle cx="260" cy="160" r="1.8"/>
    <circle cx="380" cy="70" r="2.2"/>
    <circle cx="520" cy="140" r="1.6"/>
    <circle cx="700" cy="80" r="2.6"/>
    <circle cx="860" cy="150" r="1.8"/>
    <circle cx="1010" cy="70" r="2.2"/>
    <circle cx="1180" cy="130" r="1.9"/>
    <circle cx="1320" cy="80" r="2.5"/>
    <circle cx="1460" cy="160" r="1.7"/>
    <circle cx="190" cy="250" r="1.6"/>
    <circle cx="450" cy="300" r="1.8"/>
    <circle cx="980" cy="280" r="1.7"/>
    <circle cx="1250" cy="310" r="1.6"/>
    <circle cx="1520" cy="280" r="1.9"/>
  </g>

  <!-- Decorative stars -->
  <use href="#star" x="300" y="240" transform="scale(1.1)" opacity="0.9"/>
  <use href="#star" x="1150" y="220" opacity="0.85"/>
  <use href="#star" x="820" y="330" transform="scale(0.8)" opacity="0.7"/>

  <!-- Fireworks -->
  <g opacity="0.95">
    <use href="#burst" x="360" y="250" stroke="#ff3b4e" stroke-width="4"/>
    <g fill="#ff3b4e"><circle cx="360" cy="160" r="4"/><circle cx="450" cy="250" r="4"/><circle cx="360" cy="340" r="4"/><circle cx="270" cy="250" r="4"/></g>
  </g>
  <g opacity="0.95" transform="translate(0,0)">
    <use href="#burst" x="820" y="200" stroke="#ffffff" stroke-width="4" transform="scale(1.25)" transform-origin="820 200"/>
  </g>
  <g opacity="0.95">
    <use href="#burst" x="1230" y="270" stroke="#5b8dff" stroke-width="4"/>
    <g fill="#9bbcff"><circle cx="1230" cy="180" r="4"/><circle cx="1320" cy="270" r="4"/><circle cx="1230" cy="360" r="4"/><circle cx="1140" cy="270" r="4"/></g>
  </g>
  <g opacity="0.7">
    <use href="#burst" x="600" y="380" stroke="#ffd23f" stroke-width="3" transform="scale(0.7)" transform-origin="600 380"/>
  </g>
  <g opacity="0.7">
    <use href="#burst" x="1040" y="400" stroke="#ff7aa2" stroke-width="3" transform="scale(0.6)" transform-origin="1040 400"/>
  </g>

  <!-- Bunting / flag banner -->
  <g>
    <path d="M0,40 Q400,120 800,60 Q1200,0 1600,80" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <g>
      <path d="M70,52 l60,-6 l-30,58 z" fill="#c8102e"/>
      <path d="M150,46 l60,-3 l-30,58 z" fill="#ffffff"/>
      <path d="M230,44 l60,0 l-30,58 z" fill="#1d3461"/>
      <path d="M1310,60 l60,4 l-30,58 z" fill="#c8102e"/>
      <path d="M1390,66 l60,6 l-30,58 z" fill="#ffffff"/>
      <path d="M1470,74 l60,8 l-30,58 z" fill="#1d3461"/>
    </g>
  </g>

  <!-- Picnic checkered tablecloth foreground -->
  <g>
    <path d="M0,640 Q400,600 800,628 Q1200,656 1600,612 L1600,900 L0,900 Z" fill="url(#gingham)"/>
    <path d="M0,640 Q400,600 800,628 Q1200,656 1600,612" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.85"/>
  </g>

  <!-- Picnic basket -->
  <g transform="translate(700,640)">
    <ellipse cx="100" cy="14" rx="120" ry="20" fill="#000000" opacity="0.18"/>
    <path d="M16,8 q84,-34 168,0 l-14,120 q-70,22 -140,0 z" fill="#a9682f"/>
    <path d="M16,8 q84,-34 168,0 l-4,30 q-80,-30 -160,0 z" fill="#c98a4b"/>
    <path d="M40,6 q60,-72 120,0" fill="none" stroke="#8a531f" stroke-width="10"/>
    <rect x="60" y="-30" width="80" height="44" rx="10" fill="#ffffff"/>
    <rect x="60" y="-30" width="80" height="44" rx="10" fill="url(#gingham)" opacity="0.6"/>
  </g>

  <!-- Apple pie -->
  <g transform="translate(360,720)">
    <ellipse cx="80" cy="58" rx="92" ry="20" fill="#000000" opacity="0.16"/>
    <ellipse cx="80" cy="44" rx="92" ry="30" fill="#e8b873"/>
    <ellipse cx="80" cy="34" rx="84" ry="26" fill="#f3cd8e"/>
    <g stroke="#dca85a" stroke-width="6" opacity="0.8">
      <line x1="20" y1="34" x2="140" y2="34"/>
      <line x1="40" y1="14" x2="120" y2="54"/>
      <line x1="120" y1="14" x2="40" y2="54"/>
    </g>
  </g>

  <!-- Lemonade jar -->
  <g transform="translate(1140,710)">
    <ellipse cx="60" cy="92" rx="60" ry="14" fill="#000000" opacity="0.16"/>
    <path d="M16,10 h88 a10,10 0 0 1 10,10 v66 a18,18 0 0 1 -18,18 h-72 a18,18 0 0 1 -18,-18 v-66 a10,10 0 0 1 10,-10 z" fill="#ffe27a" opacity="0.92"/>
    <rect x="16" y="6" width="88" height="14" rx="6" fill="#c8102e"/>
    <circle cx="60" cy="58" r="16" fill="#fff4c2" opacity="0.8"/>
  </g>
</svg>
