<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA VI &mdash; Countdown to Vice City</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --midnight:#160a2b;
    --deep-violet:#2c1656;
    --hot-pink:#ff2e92;
    --sunset-orange:#ff8c3c;
    --electric-blue:#2f6fe0;
    --cream:#fdf3e3;
    --grid-line:rgba(255,140,60,0.25);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    background:var(--midnight);
    color:var(--cream);
    font-family:'Rajdhani',sans-serif;
    overflow-x:hidden;
    min-height:100vh;
  }

  .sky{
    position:fixed;
    inset:0;
    z-index:-2;
    background:linear-gradient(180deg,#160a2b 0%, #2c1656 35%, #5e2a86 55%, #b8398f 72%, #ff6a4d 88%, #ffb347 100%);
  }

  .sun{
    position:fixed;
    left:50%;
    bottom:34vh;
    width:340px;
    height:340px;
    border-radius:50%;
    transform:translateX(-50%);
    background:radial-gradient(circle at 50% 50%, #fff2c8 0%, #ffd166 25%, #ff8c3c 55%, #ff2e92 85%, transparent 100%);
    box-shadow:0 0 140px 40px rgba(255,140,60,0.45);
    z-index:-2;
    opacity:0.85;
  }
  .sun::after{
    content:'';
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(180deg, transparent 0 6px, var(--midnight) 6px 12px);
    opacity:0.55;
    -webkit-mask-image:linear-gradient(180deg, transparent 0%, transparent 38%, black 38%);
            mask-image:linear-gradient(180deg, transparent 0%, transparent 38%, black 38%);
  }

  .stars{
    position:fixed;
    inset:0 0 50vh 0;
    z-index:-2;
    background-image:
      radial-gradient(1px 1px at 10% 15%, #fff 100%, transparent 0),
      radial-gradient(1px 1px at 75% 8%, #fff 100%, transparent 0),
      radial-gradient(1px 1px at 40% 22%, #fff 100%, transparent 0),
      radial-gradient(1px 1px at 60% 5%, #fff 100%, transparent 0),
      radial-gradient(1px 1px at 90% 18%, #fff 100%, transparent 0),
      radial-gradient(1px 1px at 25% 30%, #fff 100%, transparent 0),
      radial-gradient(1px 1px at 85% 28%, #fff 100%, transparent 0);
    opacity:0.6;
  }

  .grid-floor{
    position:fixed;
    left:0; right:0; bottom:0;
    height:42vh;
    z-index:-1;
    background:linear-gradient(180deg, rgba(255,46,146,0.18), rgba(22,10,43,0.9) 80%);
    overflow:hidden;
    perspective:300px;
  }
  .grid-floor::before{
    content:'';
    position:absolute;
    left:-50%; right:-50%; top:0; bottom:0;
    background-image:
      repeating-linear-gradient(90deg, var(--grid-line) 0 2px, transparent 2px 60px),
      repeating-linear-gradient(0deg, var(--grid-line) 0 2px, transparent 2px 40px);
    transform:rotateX(75deg);
    transform-origin:top;
    animation:gridmove 4s linear infinite;
  }
  @keyframes gridmove{
    from{background-position:0 0, 0 0;}
    to{background-position:0 0, 0 40px;}
  }

  .palms{
    position:fixed;
    left:0; right:0; bottom:38vh;
    height:14vh;
    z-index:-1;
    opacity:0.9;
    pointer-events:none;
  }
  .palm{
    position:absolute;
    bottom:0;
    width:60px;
    height:120px;
    background:var(--midnight);
    opacity:0.85;
  }

  main{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:6vh 5vw 8vh;
    min-height:100vh;
  }

  .logo{
    width:min(420px, 80vw);
    filter:drop-shadow(0 0 26px rgba(255,46,146,0.55)) drop-shadow(0 0 50px rgba(47,111,224,0.35));
    margin-bottom:1.2rem;
  }

  .eyebrow{
    font-family:'Anton', sans-serif;
    letter-spacing:0.45em;
    font-size:0.8rem;
    color:var(--sunset-orange);
    text-transform:uppercase;
    margin-bottom:0.6rem;
    text-shadow:0 0 12px rgba(255,140,60,0.6);
  }

  .countdown{
    display:flex;
    gap:clamp(0.6rem, 2vw, 1.6rem);
    margin:2.4rem 0 1.2rem;
    flex-wrap:wrap;
    justify-content:center;
  }

  .unit{
    background:linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    border:1px solid rgba(255,140,60,0.4);
    border-radius:10px;
    padding:1.1rem clamp(0.9rem, 2vw, 1.6rem);
    min-width:90px;
    text-align:center;
    backdrop-filter:blur(3px);
    box-shadow:0 0 24px rgba(255,46,146,0.18), inset 0 0 18px rgba(47,111,224,0.12);
  }

  .unit .num{
    font-family:'Anton', sans-serif;
    font-size:clamp(2.2rem, 6vw, 3.6rem);
    line-height:1;
    background:linear-gradient(180deg, #fff5da, var(--sunset-orange) 60%, var(--hot-pink));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:none;
  }

  .unit .label{
    font-size:0.78rem;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--cream);
    opacity:0.75;
    margin-top:0.3rem;
  }

  .release-line{
    font-size:0.95rem;
    letter-spacing:0.08em;
    opacity:0.8;
    margin-bottom:3.2rem;
    text-align:center;
  }
  .release-line strong{
    color:var(--sunset-orange);
    font-weight:600;
  }

  .horizon-section{
    width:min(720px, 92vw);
    margin-top:1rem;
  }

  .horizon-label{
    display:flex;
    justify-content:space-between;
    font-size:0.78rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    opacity:0.75;
    margin-bottom:0.5rem;
  }

  .horizon-bar{
    position:relative;
    width:100%;
    height:34px;
    border-radius:17px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,140,60,0.35);
    overflow:hidden;
    box-shadow:inset 0 0 14px rgba(0,0,0,0.4);
  }

  .horizon-fill{
    height:100%;
    width:0%;
    border-radius:17px;
    background:linear-gradient(90deg, var(--electric-blue) 0%, #8b3fae 40%, var(--hot-pink) 70%, var(--sunset-orange) 100%);
    transition:width 0.6s ease;
    position:relative;
  }

  .horizon-pct{
    text-align:center;
    margin-top:0.7rem;
    font-family:'Anton', sans-serif;
    font-size:1.4rem;
    color:var(--cream);
    letter-spacing:0.04em;
  }
  .horizon-pct span{
    color:var(--sunset-orange);
  }

  .dates-row{
    display:flex;
    justify-content:space-between;
    margin-top:0.6rem;
    font-size:0.72rem;
    opacity:0.6;
    letter-spacing:0.06em;
  }

  footer{
    margin-top:auto;
    padding-top:4rem;
    font-size:0.7rem;
    letter-spacing:0.1em;
    opacity:0.45;
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .grid-floor::before{animation:none;}
  }

  @media (max-width:480px){
    .unit{min-width:72px; padding:0.8rem 0.7rem;}
    .unit .num{font-size:2rem;}
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="stars"></div>
<div class="sun"></div>
<div class="palms" id="palms"></div>
<div class="grid-floor"></div>

  <div class="eyebrow">Leonida Awaits</div>

  <div class="countdown" id="countdown">
    <div class="unit"><div class="num" id="days">00</div><div class="label">Days</div></div>
    <div class="unit"><div class="num" id="hours">00</div><div class="label">Hours</div></div>
    <div class="unit"><div class="num" id="minutes">00</div><div class="label">Minutes</div></div>
    <div class="unit"><div class="num" id="seconds">00</div><div class="label">Seconds</div></div>
  </div>

  <div class="release-line">GTA VI lands <strong>November 19, 2026</strong> at midnight ET.</div>

  <div class="horizon-section">
    <div class="horizon-label">
      <span>Announcement</span>
      <span>Release</span>
    </div>
    <div class="horizon-bar">
      <div class="horizon-fill" id="horizonFill"></div>
    </div>
    <div class="horizon-pct" id="horizonPct">0% <span>of the wait is over</span></div>
    <div class="dates-row">
      <span>Dec 4, 2023</span>
      <span>Nov 19, 2026</span>
    </div>
  </div>

</main>

<script>
  // Both timestamps fall in EST (UTC-5), no DST adjustment needed.
  const startDate = new Date('2023-12-04T18:10:00-05:00');
  const endDate = new Date('2026-11-19T00:00:00-05:00');

  function update(){
    const now = new Date();
    let diff = endDate - now;

    if(diff <= 0){
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      document.getElementById('horizonFill').style.width = '100%';
      document.getElementById('horizonPct').innerHTML = '100% <span>It is out now</span>';
      return;
    }

    const sec = Math.floor(diff / 1000);
    const days = Math.floor(sec / 86400);
    const hours = Math.floor((sec % 86400) / 3600);
    const minutes = Math.floor((sec % 3600) / 60);
    const seconds = sec % 60;

    document.getElementById('days').textContent = String(days).padStart(2,'0');
    document.getElementById('hours').textContent = String(hours).padStart(2,'0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2,'0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2,'0');

    const totalSpan = endDate - startDate;
    const elapsed = now - startDate;
    let pct = (elapsed / totalSpan) * 100;
    pct = Math.max(0, Math.min(100, pct));

    document.getElementById('horizonFill').style.width = pct.toFixed(2) + '%';
    document.getElementById('horizonPct').innerHTML = pct.toFixed(1) + '% <span>of the wait is over</span>';
  }

  update();
  setInterval(update, 1000);

  // Scatter palm tree silhouettes along the horizon using simple CSS shapes
  const palmContainer = document.getElementById('palms');
  const palmCount = 7;
  for(let i=0; i<palmCount; i++){
    const palm = document.createElement('div');
    palm.className = 'palm';
    const left = (i / (palmCount-1)) * 100;
    const jitter = (Math.random()-0.5)*6;
    palm.style.left = (left + jitter) + '%';
    const scale = 0.7 + Math.random()*0.6;
    palm.style.transform = 'scale(' + scale + ')';
    palm.style.clipPath = "polygon(48% 100%, 52% 100%, 53% 40%, 70% 25%, 60% 30%, 75% 10%, 58% 22%, 55% 5%, 50% 20%, 45% 5%, 42% 22%, 25% 10%, 40% 30%, 30% 25%, 47% 40%)";
    palmContainer.appendChild(palm);
  }
</script>
